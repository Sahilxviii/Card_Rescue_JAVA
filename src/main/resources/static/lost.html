<!DOCTYPE html>
<html>
<head>
    <title>Report Lost Card</title>
</head>
<body>

    <h2>Report Lost Card</h2>

    <form id="lostForm">
        <input type="number" id="userId" placeholder="User ID" required><br><br>

        <input type="text" id="cardType" placeholder="Card Type (DEBIT/CREDIT)" required><br><br>

        <input type="text" id="bankName" placeholder="Bank Name" required><br><br>

        <input type="text" id="last4Digits" placeholder="Last 4 Digits" required><br><br>

        <button type="submit">Submit</button>
    </form>

    <script>
        document.getElementById("lostForm").addEventListener("submit", function(e) {
            e.preventDefault();

            const data = {
                userId: document.getElementById("userId").value,
                cardType: document.getElementById("cardType").value,
                bankName: document.getElementById("bankName").value,
                last4Digits: document.getElementById("last4Digits").value
            };

            fetch("http://localhost:8080/lost", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(data)
            })
            .then(res => res.json())
            .then(data => {
                alert("Lost card reported successfully");
            })
            .catch(err => {
                console.error(err);
                alert("Error reporting lost card");
            });
        });
    </script>

</body>
</html>
